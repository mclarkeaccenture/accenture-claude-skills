<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CompIQ Architect — Accenture Workday Compensation</title>
<style>
/* ─── RESET ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #EEECf4; color: #1a1a2e; min-height: 100vh; }

:root {
  --purple: #2D1B69;
  --purple-mid: #4527A0;
  --purple-light: #EDE7F6;
  --accent: #7C4DFF;
  --green: #00897B;
  --green-light: #E0F2F1;
  --orange: #E65100;
  --text: #1a1a2e;
  --text-muted: #6B7280;
  --border: #E5E7EB;
  --card: #FFFFFF;
  --radius: 14px;
  --shadow: 0 2px 14px rgba(45,27,105,0.09);
}

/* ─── HEADER ─── */
.app-header {
  background: var(--purple);
  color: white;
  padding: 0 24px;
  height: 64px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 16px rgba(0,0,0,0.28);
}
.header-icon {
  width: 40px; height: 40px;
  background: rgba(255,255,255,0.14);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.header-titles h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
.header-titles p { font-size: 11px; opacity: 0.6; margin-top: 1px; }
.header-badge {
  margin-left: auto;
  background: rgba(124,77,255,0.35);
  border: 1px solid rgba(124,77,255,0.5);
  color: #D8CCFF;
  padding: 4px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600;
}

/* ─── TABS ─── */
.tab-bar {
  background: var(--purple);
  padding: 0 20px;
  display: flex; gap: 2px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.tab-btn {
  background: none; border: none;
  color: rgba(255,255,255,0.55);
  padding: 12px 18px;
  font-size: 13px; font-weight: 500;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all 0.18s;
  white-space: nowrap;
}
.tab-btn:hover { color: rgba(255,255,255,0.9); }
.tab-btn.active { color: white; border-bottom-color: #7C4DFF; }

/* ─── LAYOUT ─── */
.main { max-width: 980px; margin: 0 auto; padding: 24px 16px 48px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ─── CARDS ─── */
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  padding: 24px;
  margin-bottom: 16px;
}

/* ─── BUTTONS ─── */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 10px 20px; border-radius: 10px;
  font-size: 14px; font-weight: 600;
  cursor: pointer; border: none; font-family: inherit;
  transition: all 0.18s;
}
.btn-primary { background: var(--purple); color: white; }
.btn-primary:hover { background: var(--purple-mid); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(45,27,105,0.25); }
.btn-secondary { background: var(--purple-light); color: var(--purple); }
.btn-secondary:hover { background: #DDD6F5; }
.btn-ghost { background: transparent; color: var(--text-muted); border: 1.5px solid var(--border); }
.btn-ghost:hover { background: #F5F4FB; }
.btn-sm { padding: 8px 16px; font-size: 13px; }
.btn:disabled { opacity: 0.38; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

/* ─── BADGES ─── */
.badge {
  display: inline-block; padding: 3px 9px;
  border-radius: 20px; font-size: 11px;
  font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px;
}
.badge-config   { background: #EDE7F6; color: #4527A0; }
.badge-eib      { background: #E3F2FD; color: #1565C0; }
.badge-trouble  { background: #FFF3E0; color: #BF360C; }
.badge-security { background: #FCE4EC; color: #880E4F; }
.badge-process  { background: #E8F5E9; color: #1B5E20; }

/* ─── STEP INDICATOR ─── */
.step-dots { display: flex; align-items: center; gap: 8px; justify-content: center; margin-bottom: 6px; }
.dot { width: 10px; height: 10px; border-radius: 50%; background: #DDD; transition: all 0.25s; }
.dot.active { background: var(--purple); transform: scale(1.4); }
.dot.done { background: var(--green); }
.step-label { text-align: center; font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
.step-label strong { color: var(--text); }

/* ─── CHOICE GRID ─── */
.choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.choice-card {
  background: white; border: 2px solid var(--border);
  border-radius: 12px; padding: 18px;
  cursor: pointer; transition: all 0.18s; text-align: left;
}
.choice-card:hover { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,77,255,0.1); }
.choice-card.selected { border-color: var(--accent); background: #F6F0FF; }
.choice-card .ci { font-size: 26px; margin-bottom: 8px; display: block; }
.choice-card .cl { font-weight: 700; font-size: 14px; }
.choice-card .cd { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

/* ─── TOPIC CHIPS ─── */
.topic-grid { display: flex; flex-wrap: wrap; gap: 9px; }
.topic-chip {
  padding: 9px 15px; border-radius: 10px;
  border: 2px solid var(--border); background: white;
  cursor: pointer; font-size: 13px; font-weight: 500;
  transition: all 0.18s; font-family: inherit;
}
.topic-chip:hover { border-color: var(--accent); }
.topic-chip.selected { border-color: var(--accent); background: #F6F0FF; color: var(--purple); font-weight: 600; }

/* ─── CIQ LAYOUT ─── */
.ciq-wrap {
  display: grid;
  grid-template-columns: 215px 1fr;
  gap: 14px;
  height: calc(100vh - 168px);
  min-height: 520px;
}
.ciq-sidebar { display: flex; flex-direction: column; gap: 10px; }
.sidebar-card {
  background: white; border-radius: 12px;
  padding: 14px; border: 1px solid var(--border);
}
.sb-label {
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.6px;
  color: var(--text-muted); margin-bottom: 8px;
}
.sb-select {
  width: 100%; padding: 8px 10px;
  border-radius: 8px; border: 1.5px solid var(--border);
  font-size: 13px; background: white; color: var(--text);
  cursor: pointer; font-family: inherit;
}
.sb-select:focus { outline: none; border-color: var(--accent); }
.sugg-list { display: flex; flex-direction: column; gap: 5px; }
.sugg-btn {
  background: var(--purple-light); border: none;
  border-radius: 8px; padding: 8px 10px;
  font-size: 11px; color: var(--purple);
  cursor: pointer; text-align: left;
  transition: background 0.15s; font-family: inherit; line-height: 1.4;
}
.sugg-btn:hover { background: #DDD6F5; }

/* ─── CIQ CHAT ─── */
.ciq-chat {
  display: flex; flex-direction: column;
  background: white; border-radius: 12px;
  border: 1px solid var(--border); overflow: hidden;
}
.ciq-msgs {
  flex: 1; overflow-y: auto; padding: 20px;
  display: flex; flex-direction: column; gap: 16px;
  scroll-behavior: smooth;
}
.msg { display: flex; gap: 10px; align-items: flex-start; animation: fadeUp 0.28s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }
.msg.user { flex-direction: row-reverse; }
.msg-av {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
}
.msg.user .msg-av { background: var(--purple); }
.msg.ai   .msg-av { background: var(--purple-light); }
.msg-bub {
  max-width: 78%; padding: 13px 16px;
  border-radius: 16px; font-size: 13.5px; line-height: 1.65;
}
.msg.user .msg-bub { background: var(--purple); color: white; border-bottom-right-radius: 4px; }
.msg.ai   .msg-bub { background: #F8F6FD; border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.msg-bub h4 { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
.msg-bub ol, .msg-bub ul { padding-left: 18px; margin-top: 8px; }
.msg-bub li { margin-bottom: 4px; font-size: 13px; }
.msg-bub .tip {
  margin-top: 10px; padding: 8px 12px;
  background: var(--green-light); border-radius: 8px;
  font-size: 12px; color: #1B5E20;
}
.msg-bub .errs { margin-top: 8px; font-size: 12px; color: var(--orange); }

.ciq-bar {
  padding: 12px 16px; border-top: 1px solid var(--border);
  display: flex; gap: 9px; align-items: flex-end;
}
.ciq-input {
  flex: 1; padding: 10px 14px;
  border: 1.5px solid var(--border); border-radius: 10px;
  font-size: 13px; resize: none; font-family: inherit;
  min-height: 42px; max-height: 120px;
  transition: border-color 0.18s;
  line-height: 1.5;
}
.ciq-input:focus { outline: none; border-color: var(--accent); }

/* ─── TYPING INDICATOR ─── */
.typing { display: flex; gap: 4px; align-items: center; padding: 14px 16px; }
.typing span {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--text-muted); animation: bounce 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

/* ─── Q&A ─── */
.filter-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
.fchip {
  padding: 7px 14px; border-radius: 20px;
  border: 1.5px solid var(--border);
  background: white; cursor: pointer;
  font-size: 12px; font-weight: 600;
  transition: all 0.15s; font-family: inherit;
}
.fchip:hover { border-color: var(--accent); }
.fchip.on { background: var(--purple); color: white; border-color: var(--purple); }
.qa-list { display: flex; flex-direction: column; gap: 10px; }
.qa-card { background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
.qa-head {
  padding: 15px 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  transition: background 0.12s;
}
.qa-head:hover { background: #FAFAFA; }
.qa-head .hl { display: flex; align-items: center; gap: 11px; }
.qa-title { font-weight: 600; font-size: 14px; }
.qa-body { display: none; padding: 0 20px 20px; border-top: 1px solid var(--border); }
.qa-card.open .qa-body { display: block; }
.qa-desc { font-size: 13px; color: var(--text-muted); margin-top: 12px; margin-bottom: 14px; }
.qa-sec-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.6px; color: var(--text-muted); margin-bottom: 7px;
}
.qa-steps { padding-left: 20px; }
.qa-steps li { font-size: 13px; line-height: 1.7; }
.qa-tip { background: var(--green-light); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #1B5E20; margin-top: 10px; }
.qa-err { background: #FFF3E0; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--orange); margin-top: 10px; }
.chev { transition: transform 0.2s; color: var(--text-muted); font-size: 12px; }
.qa-card.open .chev { transform: rotate(180deg); }

/* ─── SMARTSHEET SYNC ─── */
.ss-prompt-box {
  background: #1a0533; color: #DDCEFF;
  border-radius: 12px; padding: 20px;
  font-family: 'Courier New', monospace;
  font-size: 12px; line-height: 1.75;
  white-space: pre-wrap; word-break: break-word;
  max-height: 230px; overflow-y: auto;
}
.schema-tbl { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 4px; }
.schema-tbl th {
  background: #F8F6FD; padding: 8px 12px;
  text-align: left; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--text-muted); border-bottom: 1px solid var(--border);
}
.schema-tbl td { padding: 9px 12px; border-bottom: 1px solid #F0EEF8; vertical-align: top; }
.schema-tbl tr:last-child td { border-bottom: none; }
.sdot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
.s-green { background: #00897B; }
.s-orange { background: #F57C00; }
.s-grey { background: #9E9E9E; }
.sheet-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.info-box {
  padding: 14px 16px; border-radius: 10px;
  background: #F5F0FF; font-size: 13px; color: var(--purple);
  margin-top: 14px;
}

/* ─── SECTION LABEL ─── */
.sec-title {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.6px; color: var(--text-muted); margin-bottom: 14px;
}
.sec-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }
hr.divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }

/* ─── TOAST ─── */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: #1a1a2e; color: white;
  padding: 12px 20px; border-radius: 10px;
  font-size: 13px; font-weight: 500;
  transform: translateY(80px); transition: transform 0.25s;
  z-index: 999; box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
.toast.show { transform: translateY(0); }

@media (max-width: 660px) {
  .ciq-wrap { grid-template-columns: 1fr; height: auto; }
  .choice-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="app-header">
  <div class="header-icon">🏗️</div>
  <div class="header-titles">
    <h1>CompIQ Architect</h1>
    <p>Accenture · Workday Compensation · T-Mobile PxQ</p>
  </div>
  <div class="header-badge">Workday Comp</div>
</div>

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="showTab('finder',this)">🧭 Solution Finder</button>
  <button class="tab-btn" onclick="showTab('ciq',this)">🤖 Compensation IQ</button>
  <button class="tab-btn" onclick="showTab('qa',this)">📚 Q&amp;A Reference</button>
  <button class="tab-btn" onclick="showTab('sync',this)">📊 Smartsheet Sync</button>
</div>

<!-- MAIN -->
<div class="main">

  <!-- TAB 1: SOLUTION FINDER -->
  <div id="tab-finder" class="tab-panel active">
    <div id="sf-root"></div>
  </div>

  <!-- TAB 2: COMPENSATION IQ -->
  <div id="tab-ciq" class="tab-panel">
    <div class="ciq-wrap">
      <div class="ciq-sidebar">
        <div class="sidebar-card">
          <div class="sb-label">Your Role</div>
          <select class="sb-select" id="ciq-role">
            <option value="consultant">Workday Consultant</option>
            <option value="client">Client HR Admin</option>
            <option value="analyst">Business Analyst</option>
            <option value="manager">Comp Manager</option>
            <option value="integrator">Integration Lead</option>
          </select>
        </div>
        <div class="sidebar-card">
          <div class="sb-label">Response Mode</div>
          <select class="sb-select" id="ciq-mode">
            <option value="quick">⚡ Quick Answer</option>
            <option value="steps">📋 Step-by-Step</option>
            <option value="deep">🔬 Deep Dive</option>
          </select>
        </div>
        <div class="sidebar-card">
          <div class="sb-label">Country / Region</div>
          <select class="sb-select" id="ciq-country">
            <option value="US">🇺🇸 United States</option>
            <option value="UK">🇬🇧 United Kingdom</option>
            <option value="CA">🇨🇦 Canada</option>
            <option value="AU">🇦🇺 Australia</option>
            <option value="DE">🇩🇪 Germany</option>
            <option value="FR">🇫🇷 France</option>
            <option value="IN">🇮🇳 India</option>
            <option value="GLOBAL">🌍 Global</option>
          </select>
        </div>
        <div class="sidebar-card" style="flex:1;overflow:hidden">
          <div class="sb-label">Quick Prompts</div>
          <div class="sugg-list" id="ciq-sugg"></div>
        </div>
      </div>
      <div class="ciq-chat">
        <div class="ciq-msgs" id="ciq-msgs"></div>
        <div class="ciq-bar">
          <textarea class="ciq-input" id="ciq-in" rows="1"
            placeholder="Ask anything about Workday Compensation…"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();CIQ.send();}"></textarea>
          <button class="btn btn-primary btn-sm" onclick="CIQ.send()">Send ↑</button>
        </div>
      </div>
    </div>
  </div>

  <!-- TAB 3: Q&A REFERENCE -->
  <div id="tab-qa" class="tab-panel">
    <div class="filter-row" id="qa-filters"></div>
    <div class="qa-list" id="qa-list"></div>
  </div>

  <!-- TAB 4: SMARTSHEET SYNC -->
  <div id="tab-sync" class="tab-panel">
    <div id="ss-root"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
/* ─── UTILS ──────────────────────────────────────────────────────── */
function showTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'ciq') CIQ.refreshSugg();
}
function toast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}
function copy(text, label) {
  navigator.clipboard.writeText(text).then(() => toast('✓ ' + (label || 'Copied!')));
}

/* ─── SOLUTION FINDER ────────────────────────────────────────────── */
const SF = {
  step: 1, role: null, topic: null, country: 'US',

  roles: [
    { id:'client-admin',  icon:'👤', label:'Client HR Admin',    desc:'Day-to-day Workday admin tasks' },
    { id:'consultant',    icon:'🏗️', label:'Workday Consultant',  desc:'Configuration & implementation' },
    { id:'analyst',       icon:'📊', label:'Business Analyst',    desc:'Requirements & documentation' },
    { id:'comp-manager',  icon:'💼', label:'Comp Manager',        desc:'Cycle management & approvals' },
    { id:'integrator',    icon:'🔗', label:'Integration Lead',    desc:'Payroll & system connections' },
    { id:'pm',            icon:'📋', label:'Project Manager',     desc:'Workstream oversight & delivery' }
  ],

  topicsByRole: {
    'client-admin':   ['Merit cycle not opening','EIB load failed','Worker not eligible for plan','Grade profile pay range missing','OTP not appearing in payroll','Compa ratio showing 0 or blank','Cannot approve compensation change','Currency not converting correctly','Security access issue for manager','Bonus target not calculating'],
    'consultant':     ['Grade profile design & structure','Merit plan configuration','Eligibility rule logic & testing','EIB template setup & validation','Bonus plan structure','Allowance plan configuration','Security role assignment strategy','Review period & lock date setup','Compensation package design','Integration mapping to payroll'],
    'analyst':        ['Compensation plan requirements gathering','Grade structure documentation','Eligibility rule mapping','Integration data element mapping','Reporting requirements for comp cycle','UAT test script for merit cycle','Change reason matrix documentation','Compensation decision log template'],
    'comp-manager':   ['Budget management & tracking','Approval chain configuration','Merit cycle oversight & monitoring','Incentive payout processing','Equity plan review','Off-cycle compensation changes','Comp partner access & security','Compa ratio analysis across org'],
    'integrator':     ['Payroll integration element mapping','Compensation extract configuration','EIB validation error resolution','Change reason to payroll code mapping','Real-time integration vs batch approach','Compensation EIB template for payroll'],
    'pm':             ['Comp module go-live readiness checklist','UAT test script generation','Configuration migration approach','Cutover plan for compensation','Risk log for comp workstream','Weekly status narrative for steering co']
  },

  countries: ['US','UK','CA','AU','DE','FR','IN','SG','Global'],

  buildPrompt(q) {
    const roleMap = { 'client-admin':'Client HR Admin','consultant':'Workday Consultant','analyst':'Business Analyst','comp-manager':'Comp Manager','integrator':'Integration Lead','pm':'Project Manager' };
    return `[Context: ${roleMap[this.role] || this.role} | Country: ${this.country}]\n\n${q}`;
  },

  render() {
    const el = document.getElementById('sf-root');
    if (this.step === 1) {
      el.innerHTML = `<div class="card" style="max-width:580px;margin:0 auto">
        <div class="step-dots">${[1,2,3].map(i=>`<div class="dot ${i===1?'active':''}"></div>`).join('')}</div>
        <div class="step-label"><strong>Step 1 of 3</strong> — Who are you?</div>
        <div class="choice-grid">
          ${this.roles.map(r=>`<button class="choice-card ${this.role===r.id?'selected':''}" onclick="SF.pick1('${r.id}')">
            <span class="ci">${r.icon}</span>
            <div class="cl">${r.label}</div>
            <div class="cd">${r.desc}</div>
          </button>`).join('')}
        </div>
        <div style="margin-top:20px;text-align:right">
          <button class="btn btn-primary" onclick="SF.next()" ${!this.role?'disabled':''}>Next →</button>
        </div>
      </div>`;
    } else if (this.step === 2) {
      const topics = this.topicsByRole[this.role] || [];
      el.innerHTML = `<div class="card" style="max-width:580px;margin:0 auto">
        <div class="step-dots">${[1,2,3].map(i=>`<div class="dot ${i===1?'done':i===2?'active':''}"></div>`).join('')}</div>
        <div class="step-label"><strong>Step 2 of 3</strong> — What's the issue?</div>
        <div class="topic-grid">
          ${topics.map(t=>`<button class="topic-chip ${this.topic===t?'selected':''}" onclick="SF.pick2(this,'${t.replace(/'/g,"\\'")}')">${t}</button>`).join('')}
        </div>
        <div style="margin-top:20px;display:flex;justify-content:space-between">
          <button class="btn btn-ghost" onclick="SF.back()">← Back</button>
          <button class="btn btn-primary" onclick="SF.next()" ${!this.topic?'disabled':''}>Next →</button>
        </div>
      </div>`;
    } else {
      el.innerHTML = `<div class="card" style="max-width:580px;margin:0 auto">
        <div class="step-dots">${[1,2,3].map(i=>`<div class="dot ${i<3?'done':'active'}"></div>`).join('')}</div>

          <select onchange="SF.country=this.value" style="padding:8px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;width:180px;font-family:inherit">

          <button class="btn btn-primary" onclick="SF.launch()">🤖 Open in Compensation IQ →</button>

      </div>`;
    }
  },

  pick1(id)    { this.role = id; this.topic = null; this.render(); },
  pick2(el, t) { this.topic = t; this.render(); },
  back()       { if (this.step > 1) { this.step--; this.render(); } },
  next()       { if (this.step < 3) { this.step++; this.render(); } },

  launch() {
    const q = (document.getElementById('sf-q').value || '').trim();
    if (!q) return;
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-ciq').classList.add('active');
    document.querySelectorAll('.tab-btn')[1].classList.add('active');
    CIQ.post(this.buildPrompt(q));
  }
};

    ).join('');

    const items = this.filter === 'all' ? this.data : this.data.filter(d => d.cat === this.filter);
    document.getElementById('qa-list').innerHTML = items.map(t => `
      <div class="qa-card" id="qc-${t.id}">
        <div class="qa-head" onclick="QA.toggle(${t.id})">
          <div class="hl">
            <span class="badge ${this.bc[t.cat]}">${this.cats[t.cat]}</span>
            <span class="qa-title">${t.title}</span>
          </div>
          <span class="chev">▼</span>
        </div>
        <div class="qa-body">
          <div class="qa-desc">${t.desc}</div>
          <div class="qa-sec-label">Steps</div>
          <ol class="qa-steps">${t.steps.map(s=>`<li>${s}</li>`).join('')}</ol>
          ${t.tip  ? `<div class="qa-tip">💡 ${t.tip}</div>` : ''}
          ${t.err  ? `<div class="qa-err">⚠ Common errors: ${t.err}</div>` : ''}
        </div>
      </div>`).join('');
  },

  setFilter(f) { this.filter = f; this.render(); },
  toggle(id)   { document.getElementById('qc-'+id).classList.toggle('open'); }
};
